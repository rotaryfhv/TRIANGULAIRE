<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulaire Lille</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-button.active { border-bottom: 3px solid #1a365d; color: #1a365d; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

    <div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-50 text-gray-500 font-medium">
        Chargement des données en temps réel...
    </div>

    <header class="bg-blue-950 text-white text-center py-4 sticky top-0 shadow-md z-40">
        <h1 class="text-lg font-bold tracking-wide">🤝 Triangulaire - Lille</h1>
    </header>

    <main class="p-2 max-w-lg mx-auto">
        
        <section id="tab-participants" class="tab-content active">
            <div class="bg-white p-2 rounded shadow-sm mb-3 flex flex-col gap-2">
                <span class="text-[11px] font-semibold text-gray-500 uppercase tracking-wider">Filtrer & Trier par :</span>
                <div class="grid grid-cols-3 gap-1">
                    <button id="btn-sort-alpha" onclick="changeSort('alpha')" class="px-2 py-1.5 bg-blue-900 text-white rounded text-[11px] font-medium">A-Z (Nom)</button>
                    <button id="btn-sort-club" onclick="changeSort('club')" class="px-2 py-1.5 bg-gray-200 text-gray-700 rounded text-[11px] font-medium">Par Club</button>
                    <button id="btn-sort-group" onclick="changeSort('groupe')" class="px-2 py-1.5 bg-gray-200 text-gray-700 rounded text-[11px] font-medium">Par Groupe</button>
                </div>
            </div>
            
            <div id="participants-container"></div>
        </section>

        <section id="tab-programme" class="tab-content">
            <div class="flex justify-center mb-4">
                <div class="inline-flex rounded-md shadow-sm">
                    <button id="btn-lang-fr" onclick="switchLanguage('FR')" class="px-4 py-1 bg-blue-900 text-white font-bold rounded-l text-sm">FR 🇫🇷</button>
                    <button id="btn-lang-de" onclick="switchLanguage('DE')" class="px-4 py-1 bg-gray-200 text-gray-700 rounded-r text-sm">DE 🇩🇪</button>
                </div>
            </div>
            <div id="programme-container" class="bg-white rounded-lg shadow-sm overflow-hidden"></div>
        </section>

        <section id="tab-urgence" class="tab-content">
            <div class="bg-red-50 text-red-700 p-3 rounded-lg text-xs mb-4 border border-red-200">
                ⚠️ En cas de problème majeur, contactez immédiatement l'un des organisateurs ci-dessous.
            </div>
            <div id="urgence-list"></div>
        </section>

    </main>

    <div id="modal-details" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4" onclick="closeModal()">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden" onclick="event.stopPropagation()">
            <div class="bg-blue-950 p-4 text-white relative">
                <span id="modal-flag" class="absolute top-3 right-3 text-xl"></span>
                <h3 id="modal-title" class="font-bold text-base pr-8"></h3>
                <p id="modal-club" class="text-xs text-blue-200 uppercase tracking-widest mt-0.5 font-semibold"></p>
            </div>
            <div class="p-4 space-y-3">
                <div class="flex justify-center gap-4 py-2" id="modal-photos-container"></div>
                <div class="border-t border-gray-100 pt-3 space-y-2 text-sm text-gray-700">
                    <div id="modal-conjoint" class="flex items-center gap-2"></div>
                    <div id="modal-profession" class="flex items-center gap-2"></div>
                    <div id="modal-role" class="flex items-center gap-2"></div>
                    <div id="modal-phone" class="pt-2"></div>
                </div>
                <button onclick="closeModal()" class="w-full mt-2 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-lg text-xs">
                    Fermer la fiche
                </button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around shadow-lg z-40">
        <button onclick="switchTab('tab-participants', event)" class="tab-button active flex-1 py-3 text-xs text-gray-500 text-center flex flex-col items-center gap-1">
            <span class="text-lg">👥</span> Participants
        </button>
        <button onclick="switchTab('tab-programme', event)" class="tab-button flex-1 py-3 text-xs text-gray-500 text-center flex flex-col items-center gap-1">
            <span class="text-lg">📅</span> Programme
        </button>
        <button onclick="switchTab('tab-urgence', event)" class="tab-button flex-1 py-3 text-xs text-gray-500 text-center flex flex-col items-center gap-1">
            <span class="text-lg">🚨</span> Urgences
        </button>
    </nav>

    <script>
        var SPREADSHEET_ID = '126LXvjJdgHsJ1P_4OE2oL2aj3qm-YYfgUnesx8zrXIg';
        
        var dataParticipants = [];
        var dataProgramme = [];
        var dataUrgence = [];
        var userLang = navigator.language || navigator.userLanguage;
        var currentLanguage = userLang.startsWith('de') ? 'DE' : 'FR';
        var currentSort = 'alpha';

        // Logique de conversion d'origine (strictement identique à votre première version fonctionnelle)
        function convertDriveUrl(url) {
            if (!url || url.indexOf('drive.google.com') === -1) return url;
            var match = url.match(/\/file\/d\/([^\/]+)/);
            if (match && match[1]) {
                return 'https://lh3.googleusercontent.com/d/' + match[1] + '=w200';
            }
            return url;
        }

        function cleanValue(cell) {
            if (!cell) return '';
            if (cell.f) return cell.f; 
            if (cell.v !== null && cell.v !== undefined) {
                var valStr = String(cell.v);
                if (valStr.indexOf('Date(') !== -1) {
                    var m = valStr.match(/\d+/g);
                    if (m && m.length >= 5) {
                        return m[3].padStart(2, '0') + ':' + m[4].padStart(2, '0');
                    }
                }
                return cell.v;
            }
            return '';
        }

        function getDrapeau(clubName) {
            if (!clubName) return '🇪🇺';
            var c = clubName.toLowerCase();
            if (c.indexOf('fourm') !== -1) return '🇫🇷';
            if (c.indexOf('gumm') !== -1) return '🇩🇪';
            if (c.indexOf('nivel') !== -1) return '🇧🇪';
            return '🇪🇺';
        }

        async function fetchSheetByName(sheetName) {
            var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(sheetName);
            var response = await fetch(url);
            var text = await response.text();
            var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
            if (!match) throw new Error("Erreur de lecture : " + sheetName);
            return JSON.parse(match[1]).table.rows;
        }

        async function loadAllData() {
            try {
                var rowsPart = [];
                try {
                    rowsPart = await fetchSheetByName('Participants');
                } catch(e) {
                    console.error("Erreur onglet Participants", e);
                }
                
                dataParticipants = [];
                var keysPart = ['Club', 'Nom', 'Prénom', 'Tél', 'Profession', 'Photo', 'Role', 'Conjoint', 'Photo_Conjoint', 'Groupe'];

                for (var r = 0; r < rowsPart.length; r++) {
                    var row = rowsPart[r];
                    if (row && row.c) {
                        var col1 = cleanValue(row.c[1]);
                        if (!col1 || col1 === 'Nom') continue; 

                        var item = {};
                        for (var c = 0; c < keysPart.length; c++) {
                            var val = row.c[c] ? cleanValue(row.c[c]) : '';
                            if (keysPart[c] === 'Photo' || keysPart[c] === 'Photo_Conjoint') val = convertDriveUrl(val);
                            item[keysPart[c]] = val;
                        }
                        dataParticipants.push(item);
                    }
                }

                var rowsProg = [];
                try {
                    rowsProg = await fetchSheetByName('Programme');
                } catch(e) {
                    console.error("Erreur onglet Programme", e);
                }
                
                dataProgramme = [];
                for (var r = 0; r < rowsProg.length; r++) {
                    var row = rowsProg[r];
                    if (!row || !row.c) continue;
                    var colA = cleanValue(row.c[0]);
                    var colB = cleanValue(row.c[1]);
                    if (colA === 'Heure' || colA === 'Francais') continue;
                    if (colA || colB) {
                        dataProgramme.push({
                            Heure: colA,
                            Lieu_FR: colB,
                            Description_FR: row.c[2] ? cleanValue(row.c[2]) : '',
                            Lien_FR: row.c[3] ? cleanValue(row.c[3]) : '',
                            Texte_FR: row.c[4] ? cleanValue(row.c[4]) : '',
                            Lieu_DE: row.c[5] ? cleanValue(row.c[5]) : '',
                            Description_DE: row.c[6] ? cleanValue(row.c[6]) : '',
                            Lien_DE: row.c[7] ? cleanValue(row.c[7]) : '',
                            Texte_DE: row.c[8] ? cleanValue(row.c[8]) : ''
                        });
                    }
                }

                dataUrgence = [];
                var rowsUrg = [];
                try {
                    rowsUrg = await fetchSheetByName('Urgence');
                } catch (e) {
                    try {
                        rowsUrg = await fetchSheetByName('Urgences');
                    } catch(err) {
                        console.error("Erreur onglet Urgences", err);
                    }
                }
                
                for (var r = 0; r < rowsUrg.length; r++) {
                    var row = rowsUrg[r];
                    if (row && row.c) {
                        var nomUrg = cleanValue(row.c[0]);
                        var telUrg = cleanValue(row.c[1]);
                        if (nomUrg && nomUrg !== 'Nom') dataUrgence.push({ Nom: nomUrg, Numéro: telUrg });
                    }
                }

                renderParticipants();
                renderProgramme();
                renderUrgence();
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Erreur lors du traitement des données.";
            }
        }

        function renderParticipants() {
            var container = document.getElementById('participants-container');
            if (!container) return;
            container.innerHTML = '';
            
            var sorted = dataParticipants.slice();

            if (currentSort === 'alpha') {
                sorted.sort(function(a, b) { return (a.Nom || '').localeCompare(b.Nom || ''); });
                var grid = createGridElement();
                for (var i = 0; i < sorted.length; i++) grid.appendChild(createTile(sorted[i]));
                container.appendChild(grid);
                
            } else if (currentSort === 'club') {
                var groups = {};
                for (var i = 0; i < sorted.length; i++) {
                    var c = sorted[i].Club || 'Sans Club';
                    if (!groups[c]) groups[c] = [];
                    groups[c].push(sorted[i]);
                }
                for (var key in groups) {
                    container.appendChild(createGroupHeader(key));
                    var grid = createGridElement();
                    groups[key].sort(function(a, b) { return (a.Nom || '').localeCompare(b.Nom || ''); });
                    for (var j = 0; j < groups[key].length; j++) grid.appendChild(createTile(groups[key][j]));
                    container.appendChild(grid);
                }
                
            } else if (currentSort === 'groupe') {
                var groups = {};
                for (var i = 0; i < sorted.length; i++) {
                    var g = sorted[i].Groupe || 'Sans Groupe';
                    if (!groups[g]) groups[g] = [];
                    groups[g].push(sorted[i]);
                }
                for (var key in groups) {
                    container.appendChild(createGroupHeader(key));
                    var grid = createGridElement();
                    groups[key].sort(function(a, b) { return (a.Nom || '').localeCompare(b.Nom || ''); });
                    for (var j = 0; j < groups[key].length; j++) grid.appendChild(createTile(groups[key][j]));
                    container.appendChild(grid);
                }
            }
        }

        function createGridElement() {
            var grid = document.createElement('div');
            grid.className = "grid grid-cols-3 gap-2 my-2";
            return grid;
        }

        function createGroupHeader(title) {
            var header = document.createElement('h3');
            header.className = "text-xs font-bold text-blue-900 bg-blue-50 p-2 mt-4 rounded uppercase tracking-wider";
            header.innerText = title;
            return header;
        }

        function createInitialBadge1(letter) {
            var d = document.createElement('div');
            d.className = "w-14 h-14 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-sm border-2 border-white shadow-xs flex-shrink-0 z-10";
            d.innerText = letter;
            return d;
        }

        function createInitialBadge2(letter) {
            var d = document.createElement('div');
            d.className = "w-14 h-14 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-sm border-2 border-white shadow-xs flex-shrink-0 z-0";
            d.innerText = letter;
            return d;
        }

        function createTile(p) {
            var tile = document.createElement('div');
            tile.className = "bg-white p-2 rounded-xl shadow-xs border border-gray-100 flex flex-col items-center text-center relative cursor-pointer hover:shadow-md transition-all active:scale-95 overflow-hidden min-h-[145px]";
            tile.onclick = function() { openModal(p); };

            var flagSpan = document.createElement('span');
            flagSpan.className = "absolute top-1 right-1 text-xs select-none";
            flagSpan.innerText = getDrapeau(p.Club);
            tile.appendChild(flagSpan);

            var photosContainer = document.createElement('div');
            photosContainer.className = "flex -space-x-4 mt-2 mb-3 justify-center items-center h-14 w-full";
            tile.appendChild(photosContainer);

            var initial1 = p.Prénom ? p.Prénom.charAt(0) : '?';
            var initial2 = p.Conjoint ? p.Conjoint.charAt(0) : '';

            // Affichage de la photo grand format w-14 h-14 avec fallback sécurisé
            if (p.Photo && p.Photo.startsWith('http')) {
                var img1 = document.createElement('img');
                img1.src = p.Photo;
                img1.className = "w-14 h-14 rounded-full border-2 border-white object-cover shadow-xs flex-shrink-0 z-10 bg-gray-100";
                img1.onerror = function() {
                    if (img1.parentNode) {
                        img1.parentNode.replaceChild(createInitialBadge1(initial1), img1);
                    }
                };
                photosContainer.appendChild(img1);
            } else {
                photosContainer.appendChild(createInitialBadge1(initial1));
            }

            if (p.Conjoint) {
                if (p.Photo_Conjoint && p.Photo_Conjoint.startsWith('http')) {
                    var img2 = document.createElement('img');
                    img2.src = p.Photo_Conjoint;
                    img2.className = "w-14 h-14 rounded-full border-2 border-white object-cover shadow-xs flex-shrink-0 z-0 bg-gray-100";
                    img2.onerror = function() {
                        if (img2.parentNode) {
                            img2.parentNode.replaceChild(createInitialBadge2(initial2 || '👫'), img2);
                        }
                    };
                    photosContainer.appendChild(img2);
                } else {
                    photosContainer.appendChild(createInitialBadge2(initial2 || '👫'));
                }
            }

            var textContainer = document.createElement('div');
            textContainer.className = "w-full overflow-hidden";

            var nomDiv = document.createElement('div');
            nomDiv.className = "text-[11px] font-bold text-gray-950 leading-tight truncate w-full uppercase";
            nomDiv.innerText = p.Nom || '';
            textContainer.appendChild(nomDiv);

            var prenomDiv = document.createElement('div');
            prenomDiv.className = "text-[10px] font-medium text-gray-600 leading-tight truncate w-full mt-0.5";
            prenomDiv.innerText = p.Prénom || '';
            textContainer.appendChild(prenomDiv);

            if (p.Conjoint) {
                var conjointDiv = document.createElement('div');
                conjointDiv.className = "text-[9px] text-gray-400 font-medium truncate max-w-full mt-1 bg-gray-50 py-0.5 rounded-sm";
                conjointDiv.innerText = "👫 " + p.Conjoint;
                textContainer.appendChild(conjointDiv);
            }

            tile.appendChild(textContainer);
            return tile;
        }

        function openModal(p) {
            document.getElementById('modal-title').innerText = (p.Prénom || '') + ' ' + (p.Nom || '');
            document.getElementById('modal-club').innerText = p.Club || 'Sans Club';
            document.getElementById('modal-flag').innerText = getDrapeau(p.Club);

            var initial1 = p.Prénom ? p.Prénom.charAt(0) : '?';
            var initial2 = p.Conjoint ? p.Conjoint.charAt(0) : '';

            var modalPhotosContainer = document.getElementById('modal-photos-container');
            modalPhotosContainer.innerHTML = '';

            var pBox = document.createElement('div');
            pBox.className = "text-center";
            if (p.Photo && p.Photo.startsWith('http')) {
                var mImg = document.createElement('img');
                mImg.src = p.Photo;
                mImg.className = "w-20 h-20 rounded-full border border-gray-200 object-cover shadow-sm mx-auto bg-gray-50 block";
                mImg.style.cssText = "width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;";
                mImg.onerror = function() {
                    var b = createInitialBadge1(initial1);
                    b.className = "w-20 h-20 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-xl mx-auto shadow-sm";
                    mImg.parentNode.replaceChild(b, mImg);
                };
                pBox.appendChild(mImg);
            } else {
                var b = createInitialBadge1(initial1);
                b.className = "w-20 h-20 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-xl mx-auto shadow-sm";
                pBox.appendChild(b);
            }
            var pLabel = document.createElement('p');
            pLabel.className = "text-[10px] text-gray-400 mt-1";
            pLabel.innerText = p.Prénom || 'Participant';
            pBox.appendChild(pLabel);
            modalPhotosContainer.appendChild(pBox);

            if (p.Conjoint) {
                var cBox = document.createElement('div');
                cBox.className = "text-center";
                if (p.Photo_Conjoint && p.Photo_Conjoint.startsWith('http')) {
                    var cImg = document.createElement('img');
                    cImg.src = p.Photo_Conjoint;
                    cImg.className = "w-20 h-20 rounded-full border border-gray-200 object-cover shadow-sm mx-auto bg-gray-50 block";
                    cImg.style.cssText = "width:80px;height:80px;border-radius:50%;object-fit:cover;display:block;margin:0 auto;";
                    cImg.onerror = function() {
                        var b2 = createInitialBadge2(initial2 || '👫');
                        b2.className = "w-20 h-20 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-xl mx-auto shadow-sm";
                        cImg.parentNode.replaceChild(b2, cImg);
                    };
                    cBox.appendChild(cImg);
                } else {
                    var b2 = createInitialBadge2(initial2 || '👫');
                    b2.className = "w-20 h-20 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-xl mx-auto shadow-sm";
                    cBox.appendChild(b2);
                }
                var cLabel = document.createElement('p');
                cLabel.className = "text-[10px] text-gray-400 mt-1";
                cLabel.innerText = p.Conjoint;
                cBox.appendChild(cLabel);
                modalPhotosContainer.appendChild(cBox);
            }
            
            document.getElementById('modal-conjoint').innerHTML = p.Conjoint ? '<strong>👫 Conjoint :</strong> ' + p.Conjoint : '';
            document.getElementById('modal-profession').innerHTML = p.Profession ? '<strong>💼 Profession :</strong> ' + p.Profession : '<strong>💼 Profession :</strong> Non renseignée';
            document.getElementById('modal-role').innerHTML = p.Role ? '<strong>🛡️ Rôle :</strong> <span class="text-amber-600 font-bold">' + p.Role + '</span>' : '<strong>🛡️ Rôle :</strong> Participant';
            
            var phoneEl = document.getElementById('modal-phone');
            if (p.Tél) {
                phoneEl.innerHTML = '<a href="tel:' + p.Tél + '" class="w-full flex items-center justify-center gap-2 py-2.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold rounded-lg text-xs border border-emerald-200">🤙 Appeler le ' + p.Tél + '</a>';
            } else {
                phoneEl.innerHTML = '<div class="text-center text-xs text-gray-400 italic py-2">Pas de numéro de téléphone enregistré</div>';
            }

            var m = document.getElementById('modal-details');
            m.classList.remove('hidden');
            m.classList.add('flex');
        }

        function closeModal() {
            var m = document.getElementById('modal-details');
            m.classList.remove('flex');
            m.classList.add('hidden');
        }

        function changeSort(type) {
            currentSort = type;
            document.getElementById('btn-sort-alpha').className = type === 'alpha' ? 'px-2 py-1.5 bg-blue-900 text-white rounded text-[11px] font-medium' : 'px-2 py-1.5 bg-gray-200 text-gray-700 rounded text-[11px] font-medium';
            document.getElementById('btn-sort-club').className = type === 'club' ? 'px-2 py-1.5 bg-blue-900 text-white rounded text-[11px] font-medium' : 'px-2 py-1.5 bg-gray-200 text-gray-700 rounded text-[11px] font-medium';
            document.getElementById('btn-sort-group').className = type === 'groupe' ? 'px-2 py-1.5 bg-blue-900 text-white rounded text-[11px] font-medium' : 'px-2 py-1.5 bg-gray-200 text-gray-700 rounded text-[11px] font-medium';
            renderParticipants();
        }

        function renderProgramme() {
            var container = document.getElementById('programme-container');
            if (!container) return;
            container.innerHTML = '';
            
            for (var i = 0; i < dataProgramme.length; i++) {
                (function(index) {
                    var item = dataProgramme[index];
                    var estTitreJour = (item.Heure.indexOf(':') === -1 && item.Heure.length > 4);
                    
                    if (estTitreJour) {
                        var dayHeader = document.createElement('div');
                        dayHeader.className = "bg-slate-800 text-white font-bold p-2 text-xs uppercase tracking-wider text-center mt-3 first:mt-0";
                        dayHeader.innerText = formaterDateMeteo(item.Heure, currentLanguage);
                        container.appendChild(dayHeader);
                        return;
                    }

                    var lieu = currentLanguage === 'FR' ? (item.Lieu_FR || '') : (item.Lieu_DE || '');
                    var desc = currentLanguage === 'FR' ? (item.Description_FR || '') : (item.Description_DE || '');
                    var lienPdf = currentLanguage === 'FR' ? (item.Lien_FR || '') : (item.Lien_DE || '');
                    var texteParDefaut = currentLanguage === 'FR' ? '📄 Voir le document' : '📄 Dokument ansehen';
                    var texteLien = currentLanguage === 'FR' ? (item.Texte_FR || texteParDefaut) : (item.Texte_DE || texteParDefaut);
                    
                    var detailsId = 'details-' + index;
                    var div = document.createElement('div');
                    div.className = "bg-white border-b border-gray-100 p-4";
                    
                    var aDuContenu = desc || lienPdf;
                    var badgeDecouvrir = aDuContenu ? '<span class="text-gray-400 text-[10px] bg-gray-100 px-1.5 py-0.5 rounded">▼ Détails</span>' : '';
                    
                    var detailsHtml = '';
                    if (aDuContenu) {
                        detailsHtml += '<div id="' + detailsId + '" class="hidden mt-3 text-xs text-gray-600 bg-slate-50 p-3 rounded border-l-2 border-blue-900 leading-relaxed">';
                        if (desc) {
                            detailsHtml += '<p class="mb-3">' + desc.replace(/\n/g, '<br>') + '</p>';
                        }
                        if (lienPdf) {
                            detailsHtml += '<a href="' + lienPdf + '" target="_blank" class="inline-flex items-center gap-1.5 bg-blue-900 hover:bg-blue-950 text-white font-semibold px-3 py-1.5 rounded text-[11px] shadow-sm transition-colors mt-1">' + texteLien + '</a>';
                        }
                        detailsHtml += '</div>';
                    }
                    
                    div.innerHTML = '<div class="flex justify-between items-center ' + (aDuContenu ? 'cursor-pointer' : '') + ' font-medium" id="trigger-' + detailsId + '">' +
                            '<div class="flex items-baseline gap-3 min-w-0">' +
                                '<span class="text-blue-900 font-bold text-sm w-12 flex-shrink-0">' + (item.Heure || '') + '</span>' +
                                '<span class="text-gray-900 text-sm font-semibold truncate">' + lieu + '</span>' +
                            '</div>' +
                            badgeDecouvrir +
                        '</div>' + detailsHtml;
                    
                    container.appendChild(div);
                    
                    var trigger = document.getElementById('trigger-' + detailsId);
                    if (trigger && aDuContenu) {
                        trigger.addEventListener('click', function() {
                            var el = document.getElementById(detailsId);
                            if (el) el.classList.toggle('hidden');
                        });
                    }
                })(i);
            }
        }

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('btn-lang-fr').className = lang === 'FR' ? 'px-4 py-1 bg-blue-900 text-white font-bold rounded-l text-sm' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-l text-sm';
            document.getElementById('btn-lang-de').className = lang === 'DE' ? 'px-4 py-1 bg-blue-900 text-white font-bold rounded-r text-sm' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-r text-sm';
            renderProgramme();
        }

        function renderUrgence() {
            var listEl = document.getElementById('urgence-list');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            for (var i = 0; i < dataUrgence.length; i++) {
                var u = dataUrgence[i];
                var div = document.createElement('div');
                div.className = "bg-white p-4 rounded-lg shadow-sm border border-red-100 my-2 flex justify-between items-center";
                div.innerHTML = '<div>' +
                        '<div class="font-bold text-gray-900 text-sm uppercase">' + (u.Nom || '') + '</div>' +
                        '<div class="text-xs text-red-600 font-mono font-semibold mt-0.5">' + (u.Numéro || 'Pas de numéro') + '</div>' +
                    '</div>' +
                    (u.Numéro ? '<a href="tel:' + u.Numéro + '" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-sm flex items-center gap-1">📞 Appeler</a>' : '');
                listEl.appendChild(div);
            }
        }

        function switchTab(tabId, e) {
            var contents = document.querySelectorAll('.tab-content');
            for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
            
            var buttons = document.querySelectorAll('.tab-button');
            for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
            
            document.getElementById(tabId).classList.add('active');
            if (e && e.currentTarget) {
                e.currentTarget.classList.add('active');
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadAllData();
            switchLanguage(currentLanguage);
        });

        function formaterDateMeteo(texteDate, lang) {
            var texteComplet = texteDate;
            if (texteDate.indexOf('2027') === -1) {
                texteComplet = texteDate + ' 2027';
            }
            var moisFR = ['janvier', 'février', 'mars', 'avril', 'mai', 'juin', 'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'];
            var parts = texteComplet.toLowerCase().split(' ');
            var jourNum = null;
            var moisIndex = -1;
            var anneeNum = 2027;
            for (var i = 0; i < parts.length; i++) {
                if (!isNaN(parts[i]) && parts[i].length <= 2) jourNum = parseInt(parts[i], 10);
                var idx = moisFR.indexOf(parts[i]);
                if (idx !== -1) moisIndex = idx;
                if (!isNaN(parts[i]) && parts[i].length === 4) anneeNum = parseInt(parts[i], 10);
            }
            if (jourNum === null || moisIndex === -1) return texteDate;
            var dateObj = new Date(anneeNum, moisIndex, jourNum);
            var codeLangue = lang === 'DE' ? 'de-DE' : 'fr-FR';
            var options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            return new Intl.DateTimeFormat(codeLangue, options).format(dateObj);
        }
    </script>
</body>
