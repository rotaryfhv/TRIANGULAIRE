<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangulaire Lille</title>
<!-- Tailwind CSS pour un design moderne et rapide -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-button.active { border-bottom: 3px solid #1a365d; color: #1a365d; font-weight:
bold; }
</style>
</html>
<body class="bg-gray-50 font-sans pb-20">
<!-- SCRIPT DE CONFIGURATION -->
<script>
// REMPLACEZ CETTE VALEUR PAR VOTRE ID DE GOOGLE SHEET
const SPREADSHEET_ID = '126LXvjJdgHsJ1P_4OE2oL2aj3qm-YYfgUnesx8zrXIg';
let dataParticipants = [];
let dataProgramme = [];
let dataUrgence = [];
let currentLanguage = 'FR';
let currentSort = 'alpha'; // 'alpha' ou 'club'
// Fonction générique pour lire l'API Viz de Google Sheets
async function fetchSheetTab(tabName) {
const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?
tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
const response = await fetch(url);
const text = await response.text();
// Nettoyage de la réponse Google JSON
const json = JSON.parse(text.substr(47).slice(0, -2));
const rows = json.table.rows;
const cols = json.table.cols.map(c => c.label || '');
return rows.map(row => {
let item = {};
row.c.forEach((cell, i) => {
if(cols[i]) {
item[cols[i]] = cell ? (cell.v || '') : '';
}
});
return item;
});
}
async function initApp() {
try {
dataParticipants = await fetchSheetTab('Participants');
dataProgramme = await fetchSheetTab('Programme');
dataUrgence = await fetchSheetTab('Urgence');
renderParticipants();
renderProgramme();
renderUrgence();

document.getElementById('loading').style.display = 'none';
} catch (error) {
console.error(error);
document.getElementById('loading').innerText = "Erreur de chargement des
données. Vérifiez la publication de votre Sheet.";
}
}
// --- ONGLET PARTICIPANTS ---
function renderParticipants() {
let listEl = document.getElementById('participants-list');
listEl.innerHTML = '';
let sorted = [...dataParticipants];
if (currentSort === 'alpha') {
sorted.sort((a, b) => (a.Nom || '').localeCompare(b.Nom || ''));
// Rendu simple en liste alphabétique
sorted.forEach(p => listEl.appendChild(createParticipantCard(p)));
} else {
// Tri par Club
let clubs = {};
sorted.forEach(p => {
let c = p.Club || 'Sans Club';
if(!clubs[c]) clubs[c] = [];
clubs[c].push(p);
});
for (let club in clubs) {
let header = document.createElement('h3');
header.className = "text-md font-bold text-blue-900 bg-blue-50 p-2 mt-4
rounded";
header.innerText = club;
listEl.appendChild(header);
clubs[club].sort((a,b) => (a.Nom || '').localeCompare(b.Nom ||
'')).forEach(p => {
listEl.appendChild(createParticipantCard(p));
});
}
}
}
function createParticipantCard(p) {
let div = document.createElement('div');
div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-100 my-2
flex items-center gap-3";
let photoUrl = p.Photo || 'https://via.placeholder.com/150?text=No+Photo';
div.innerHTML = `
<img src="${photoUrl}" class="w-12 h-12 rounded-full object-cover bg-gray-200"
onerror="this.src='https://via.placeholder.com/150?text=Photo'">
<div class="flex-1">
<div class="font-bold text-gray-800">${p.Nom || ''} ${p.Prénom || ''}</
div>
<div class="text-xs text-gray-500">${p.Profession || ''} ${p.Conjoint ? '•
Conjoint(e) : '+p.Conjoint : ''}</div>
<div class="text-xs text-blue-700 italic">${p.Club || ''}</div>
</div>
`;
return div;
}
function changeSort(type) {

currentSort = type;
document.getElementById('btn-sort-alpha').className = type === 'alpha' ? 'px-3
py-1 bg-blue-900 text-white rounded text-xs' : 'px-3 py-1 bg-gray-200 text-gray-700 rounded
text-xs';
document.getElementById('btn-sort-club').className = type === 'club' ? 'px-3 py-1

bg-blue-900 text-white rounded text-xs' : 'px-3 py-1 bg-gray-200 text-gray-700 rounded text-
xs';

renderParticipants();
}
// --- ONGLET PROGRAMME ---
function renderProgramme() {
let container = document.getElementById('programme-container');
container.innerHTML = '';
dataProgramme.forEach((item, index) => {
let lieu = currentLanguage === 'FR' ? (item.Lieu_FR || '') : (item.Lieu_DE ||
'');
let desc = currentLanguage === 'FR' ? (item.Description_FR || '') :
(item.Description_DE || '');
let detailsId = `details-${index}`;
let div = document.createElement('div');
div.className = "bg-white border-b border-gray-200 p-4";
div.innerHTML = `
<div class="flex justify-between items-center cursor-pointer font-medium"
onclick="toggleDetails('${detailsId}')">
<div class="flex gap-3">
<span class="text-blue-900 font-bold w-16">${item.Heure || ''}</
span>
<span class="text-gray-800">${lieu}</span>
</div>
<span class="text-gray-400 text-xs">▼ Dérouler</span>
</div>
<div id="${detailsId}" class="hidden mt-3 text-sm text-gray-600 bg-gray-50
p-3 rounded border-l-2 border-blue-500 transition-all">
${desc.replace(/\n/g, '<br>')}
</div>
`;
container.appendChild(div);
});
}
function toggleDetails(id) {
let el = document.getElementById(id);
el.classList.toggle('hidden');
}
function switchLanguage(lang) {
currentLanguage = lang;

document.getElementById('btn-lang-fr').className = lang === 'FR' ? 'px-4 py-1 bg-
blue-900 text-white font-bold rounded-l' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-l';

document.getElementById('btn-lang-de').className = lang === 'DE' ? 'px-4 py-1 bg-
blue-900 text-white font-bold rounded-r' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-r';

renderProgramme();
}
// --- ONGLET URGENCE ---
function renderUrgence() {
let listEl = document.getElementById('urgence-list');

listEl.innerHTML = '';
dataUrgence.forEach(u => {
let div = document.createElement('div');
div.className = "bg-white p-4 rounded-lg shadow-sm border border-red-100 my-2
flex justify-between items-center";
div.innerHTML = `
<div>
<div class="font-bold text-gray-800">${u.Nom || ''}</div>
<div class="text-sm text-red-600 font-mono font-semibold">${u.Numéro
|| ''}</div>
</div>

<a href="tel:${u.Numéro || ''}" class="bg-red-500 hover:bg-red-600 text-
white px-4 py-2 rounded-full text-sm font-bold flex items-center gap-1">

Appeler
</a>
`;
listEl.appendChild(div);
});
}
// --- NAVIGATION INTERNE ---
function switchTab(tabId) {
document.querySelectorAll('.tab-content').forEach(el =>
el.classList.remove('active'));
document.querySelectorAll('.tab-button').forEach(el =>
el.classList.remove('active'));
document.getElementById(tabId).classList.add('active');
event.currentTarget.classList.add('active');
}
window.onload = initApp;
</script>
<!-- ÉCRAN D'ATTENTE -->
<div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-50
text-gray-500 font-medium">
Chargement des données en temps réel...
</div>
<!-- EN-TÊTE FIXE -->
<header class="bg-blue-950 text-white text-center py-4 sticky top-0 shadow-md z-40">
<h1 class="text-lg font-bold tracking-wide"> Triangulaire - Lille</h1>
</header>
<!-- CONTENU DES ONGLETS -->
<main class="p-4 max-w-md mx-auto">
<!-- ONTLET 1 : PARTICIPANTS -->
<section id="tab-participants" class="tab-content active">

<div class="flex justify-between items-center mb-4 bg-white p-2 rounded shadow-
sm">

<span class="text-xs font-semibold text-gray-500">Trier par :</span>
<div class="flex gap-1">
<button id="btn-sort-alpha" onclick="changeSort('alpha')" class="px-3 py-1
bg-blue-900 text-white rounded text-xs">A-Z (Nom)</button>
<button id="btn-sort-club" onclick="changeSort('club')" class="px-3 py-1
bg-gray-200 text-gray-700 rounded text-xs">Par Club</button>
</div>
</div>

<div id="participants-list"></div>
</section>
<!-- ONGLET 2 : PROGRAMME -->
<section id="tab-programme" class="tab-content">
<div class="flex justify-center mb-4">
<div class="inline-flex rounded-md shadow-sm">
<button id="btn-lang-fr" onclick="switchLanguage('FR')" class="px-4 py-1
bg-blue-900 text-white font-bold rounded-l text-sm">FR </button>
<button id="btn-lang-de" onclick="switchLanguage('DE')" class="px-4 py-1
bg-gray-200 text-gray-700 rounded-r text-sm">DE </button>
</div>
</div>

<div id="programme-container" class="bg-white rounded-lg shadow-sm overflow-
hidden"></div>

</section>
<!-- ONGLET 3 : URGENCE -->
<section id="tab-urgence" class="tab-content">

<div class="bg-red-50 text-red-700 p-3 rounded-lg text-xs mb-4 border border-
red-200">

En cas de problème majeur, contactez immédiatement l'un des organisateurs
ci-dessous.
</div>
<div id="urgence-list"></div>
</section>
</main>
<!-- BARRE DE NAVIGATION INFÉRIEURE FIXE -->

<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-
around shadow-lg z-40">

<button onclick="switchTab('tab-participants')" class="tab-button active flex-1 py-3
text-xs text-gray-500 text-center flex flex-col items-center gap-1">
<span class="text-lg"> </span> Participants
</button>
<button onclick="switchTab('tab-programme')" class="tab-button flex-1 py-3 text-xs
text-gray-500 text-center flex flex-col items-center gap-1">
<span class="text-lg"> </span> Programme
</button>

<button onclick="switchTab('tab-urgence')" class="tab-button flex-1 py-3 text-xs text-
gray-500 text-center flex flex-col items-center gap-1">

<span class="text-lg"> </span> Urgences
</button>
</nav>
</body>
</html>
