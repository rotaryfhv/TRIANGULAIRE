<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangulaire Lille</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .tab-button.active { border-bottom: 3px solid #1a365d; color: #1a365d; font-weight: bold; }
    </style>
</head>
<body class="bg-gray-50 font-sans pb-20">

    <div id="loading" class="fixed inset-0 bg-white flex items-center justify-center z-50 text-gray-500 font-medium">
        Chargement des données en temps réel...
    </div>

    <header class="bg-blue-950 text-white text-center py-4 sticky top-0 shadow-md z-40">
        <h1 class="text-lg font-bold tracking-wide">🤝 Triangulaire - Lille</h1>
    </header>

    <main class="p-4 max-w-md mx-auto">
        
        <section id="tab-participants" class="tab-content active">
            <div class="flex justify-between items-center mb-4 bg-white p-2 rounded shadow-sm">
                <span class="text-xs font-semibold text-gray-500">Trier par :</span>
                <div class="flex gap-1">
                    <button id="btn-sort-alpha" onclick="changeSort('alpha')" class="px-3 py-1 bg-blue-900 text-white rounded text-xs">A-Z (Nom)</button>
                    <button id="btn-sort-club" onclick="changeSort('club')" class="px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs">Par Club</button>
                </div>
            </div>
            <div id="participants-list"></div>
        </section>

        <section id="tab-programme" class="tab-content">
            <div class="flex justify-center mb-4">
                <div class="inline-flex rounded-md shadow-sm">
                    <button id="btn-lang-fr" onclick="switchLanguage('FR')" class="px-4 py-1 bg-blue-900 text-white font-bold rounded-l text-sm">FR 🇫🇷</button>
                    <button id="btn-lang-de" onclick="switchLanguage('DE')" class="px-4 py-1 bg-gray-200 text-gray-700 rounded-r text-sm">DE 🇩🇪</button>
                </div>
            </div>
            <div id="programme-container" class="bg-white rounded-lg shadow-sm overflow-hidden"></div>
        </section>

        <section id="tab-urgence" class="tab-content">
            <div class="bg-red-50 text-red-700 p-3 rounded-lg text-xs mb-4 border border-red-200">
                ⚠️ En cas de problème majeur, contactez immédiatement l'un des organisateurs ci-dessous.
            </div>
            <div id="urgence-list"></div>
        </section>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around shadow-lg z-40">
        <button onclick="switchTab('tab-participants')" class="tab-button active flex-1 py-3 text-xs text-gray-500 text-center flex flex-col items-center gap-1">
            <span class="text-lg">👥</span> Participants
        </button>
        <button onclick="switchTab('tab-programme')" class="tab-button flex-1 py-3 text-xs text-gray-500 text-center flex flex-col items-center gap-1">
            <span class="text-lg">📅</span> Programme
        </button>
        <button onclick="switchTab('tab-urgence')" class="tab-button flex-1 py-3 text-xs text-gray-500 text-center flex flex-col items-center gap-1">
            <span class="text-lg">🚨</span> Urgences
        </button>
    </nav>

    <script>
        var SPREADSHEET_ID = '126LXvjJdgHsJ1P_4OE2oL2aj3qm-YYfgUnesx8zrXIg';
        
        var dataParticipants = [];
        var dataProgramme = [];
        var dataUrgence = [];
        var currentLanguage = 'FR';
        var currentSort = 'alpha';

        // Fonction magique pour transformer les liens de partage Google Drive en images affichables
        function convertDriveUrl(url) {
            if (!url || url.indexOf('drive.google.com') === -1) return url;
            var match = url.match(/\/file\/d\/([^\/]+)/);
            if (match && match[1]) {
                return 'https://docs.google.com/uc?export=view&id=' + match[1];
            }
            return url;
        }

        // Nettoyage intelligent des heures et formats Google Sheets
        function cleanValue(cell) {
            if (!cell) return '';
            if (cell.f) return cell.f; // Donne la priorité au texte affiché dans la case (ex: "10:00")
            if (cell.v !== null && cell.v !== undefined) {
                var valStr = String(cell.v);
                if (valStr.indexOf('Date(') !== -1) {
                    var m = valStr.match(/\d+/g);
                    if (m && m.length >= 5) {
                        var hrs = m[3].length === 1 ? '0' + m[3] : m[3];
                        var mins = m[4].length === 1 ? '0' + m[4] : m[4];
                        return hrs + ':' + mins;
                    }
                }
                return cell.v;
            }
            return '';
        }

        async function loadAllData() {
            try {
                // 1. CHARGEMENT DE L'ONGLET PARTICIPANTS (gid=0)
                var resPart = await fetch('https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:json&gid=0');
                var textPart = await resPart.text();
                var matchPart = textPart.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                var jsonPart = JSON.parse(matchPart[1]);
                var rowsPart = jsonPart.table.rows;
                
                dataParticipants = [];
                // Ordre exact de votre capture d'écran 1
                var keysPart = ['Club', 'Nom', 'Prénom', 'Tél', 'Profession', 'Photo', 'Role', 'Conjoint'];
                
                for (var r = 0; r < rowsPart.length; r++) {
                    var row = rowsPart[r];
                    if (row && row.c && r > 0) { // On ignore la ligne d'en-tête (r=0)
                        var item = {};
                        for (var c = 0; c < keysPart.length; c++) {
                            var val = cleanValue(row.c[c]);
                            if (keysPart[c] === 'Photo') val = convertDriveUrl(val);
                            item[keysPart[c]] = val;
                        }
                        if (item.Nom || item.Prénom) dataParticipants.push(item);
                    }
                }

                // 2. CHARGEMENT DE L'ONGLET PROGRAMME + URGENCE COMPILÉ (gid=1736856417)
                var resProg = await fetch('https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:json&gid=1736856417');
                var textProg = await resProg.text();
                var matchProg = textProg.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
                var jsonProg = JSON.parse(matchProg[1]);
                var rowsProg = jsonProg.table.rows;

                dataProgramme = [];
                dataUrgence = [];
                
                var enZoneUrgence = false;

                for (var r = 0; r < rowsProg.length; r++) {
                    var row = rowsProg[r];
                    if (!row || !row.c) continue;
                    
                    var colA = cleanValue(row.c[0]);
                    var colB = cleanValue(row.c[1]);

                    // Détection du tableau d'urgence situé au fond de l'onglet Programme (Capture 6)
                    if (colA === 'Nom' && colB === 'Numéro') {
                        enZoneUrgence = true;
                        continue;
                    }
                    if (colA.indexOf('BERNARD') !== -1 || colA.indexOf('MARIE-CLAIRE') !== -1) {
                        enZoneUrgence = true;
                    }

                    if (enZoneUrgence) {
                        // On extrait les contacts d'urgence
                        if (colA) {
                            dataUrgence.push({ Nom: colA, Numéro: colB });
                        }
                    } else {
                        // On extrait le programme classique (On ignore la ligne d'en-tête globale)
                        if (r > 0 && (colA || colB)) {
                            dataProgramme.push({
                                Heure: colA,
                                Lieu_FR: colB,
                                Description_FR: cleanValue(row.c[2]),
                                Lieu_DE: cleanValue(row.c[3]),
                                Description_DE: cleanValue(row.c[4])
                            });
                        }
                    }
                }

                // Affichage final des éléments
                renderParticipants();
                renderProgramme();
                renderUrgence();
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Erreur de synchronisation. Vérifiez l'accès public du Sheet.";
            }
        }

        function renderParticipants() {
            var listEl = document.getElementById('participants-list');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            var sorted = dataParticipants.slice();
            if (currentSort === 'alpha') {
                sorted.sort(function(a, b) { return (a.Nom || '').localeCompare(b.Nom || ''); });
                for (var i = 0; i < sorted.length; i++) {
                    listEl.appendChild(createParticipantCard(sorted[i]));
                }
            } else {
                var clubs = {};
                for (var i = 0; i < sorted.length; i++) {
                    var p = sorted[i];
                    var c = p.Club || 'Sans Club';
                    if (!clubs[c]) clubs[c] = [];
                    clubs[c].push(p);
                }
                for (var club in clubs) {
                    var header = document.createElement('h3');
                    header.className = "text-xs font-bold text-blue-900 bg-blue-50 p-2 mt-4 rounded uppercase tracking-wider";
                    header.innerText = club;
                    listEl.appendChild(header);
                    
                    clubs[club].sort(function(a, b) { return (a.Nom || '').localeCompare(b.Nom || ''); });
                    for (var j = 0; j < clubs[club].length; j++) {
                        listEl.appendChild(createParticipantCard(clubs[club][j]));
                    }
                }
            }
        }

        function createParticipantCard(p) {
            var div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-100 my-2 flex items-center gap-3";
            
            // Avatar SVG de secours si pas de photo
            var photoHtml = '<div class="w-12 h-12 rounded-full bg-slate-200 flex items-center justify-center text-slate-500 font-bold text-sm flex-shrink-0">' + (p.Prénom ? p.Prénom.charAt(0) : '?') + '</div>';
            
            // Si une URL de photo convertie existe
            if (p.Photo && p.Photo.indexOf('http') !== -1) {
                photoHtml = '<img src="' + p.Photo + '" class="w-12 h-12 rounded-full object-cover bg-gray-100 flex-shrink-0" onerror="this.src=\'data:image/svg+xml;utf8,<svg xmlns=\\\'http://www.w3.org/2000/svg\\\' width=\\\'48\\\' height=\\\'48\\\'><circle cx=\\\'24\\\' cy=\\\'24\\\' r=\\\'24\\\' fill=\\\'%23cbd5e1\\\'/><text x=\\\'24\\\' y=\\\'28\\\' font-size=\\\'16\\\' font-family=\\\'sans-serif\\\' font-weight=\\\'bold\\\' fill=\\\'%2364748b\\\' text-anchor=\\\'middle\\\'>' + (p.Prénom ? p.Prénom.charAt(0) : '?') + '</text></svg>\'">';
            }
            
            var detailsSub = [];
            if (p.Profession) detailsSub.push(p.Profession);
            if (p.Role) detailsSub.push('<span class="text-amber-600 font-medium">' + p.Role + '</span>');
            if (p.Conjoint) detailsSub.push('👫 ' + p.Conjoint);
            
            div.innerHTML = photoHtml +
                '<div class="flex-1 min-w-0">' +
                    '<div class="font-bold text-gray-900 text-sm truncate">' + (p.Nom || '') + ' ' + (p.Prénom || '') + '</div>' +
                    '<div class="text-xs text-gray-500 truncate">' + (detailsSub.join(' • ') || 'Participant') + '</div>' +
                    '<div class="text-[10px] text-blue-800 font-bold mt-0.5 uppercase tracking-wide">' + (p.Club || '') + '</div>' +
                '</div>' +
                (p.Tél ? '<a href="tel:' + p.Tél + '" class="p-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-600 rounded-full text-xs flex-shrink-0">📞</a>' : '');
            return div;
        }

        function changeSort(type) {
            currentSort = type;
            document.getElementById('btn-sort-alpha').className = type === 'alpha' ? 'px-3 py-1 bg-blue-900 text-white rounded text-xs' : 'px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs';
            document.getElementById('btn-sort-club').className = type === 'club' ? 'px-3 py-1 bg-blue-900 text-white rounded text-xs' : 'px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs';
            renderParticipants();
        }

        function renderProgramme() {
            var container = document.getElementById('programme-container');
            if (!container) return;
            container.innerHTML = '';
            
            for (var i = 0; i < dataProgramme.length; i++) {
                (function(index) {
                    var item = dataProgramme[index];
                    
                    // Si la ligne correspond à un titre de journée (ex: "dimanche 12 d...")
                    var estTitreJour = (item.Heure.indexOf(':') === -1 && item.Heure.length > 5);
                    if (estTitreJour) {
                        var dayHeader = document.createElement('div');
                        dayHeader.className = "bg-slate-800 text-white font-bold p-2 text-xs uppercase tracking-wider text-center mt-2 first:mt-0";
                        dayHeader.innerText = item.Heure;
                        container.appendChild(dayHeader);
                        return;
                    }

                    var lieu = currentLanguage === 'FR' ? (item.Lieu_FR || '') : (item.Lieu_DE || '');
                    var desc = currentLanguage === 'FR' ? (item.Description_FR || '') : (item.Description_DE || '');
                    
                    var detailsId = 'details-' + index;
                    var div = document.createElement('div');
                    div.className = "bg-white border-b border-gray-100 p-4";
                    
                    var badgeDecouvrir = desc ? '<span class="text-gray-400 text-[10px] bg-gray-100 px-1.5 py-0.5 rounded">▼ Voir</span>' : '';
                    
                    div.innerHTML = '<div class="flex justify-between items-center ' + (desc ? 'cursor-pointer' : '') + ' font-medium" id="trigger-' + detailsId + '">' +
                            '<div class="flex items-baseline gap-3 min-w-0">' +
                                '<span class="text-blue-900 font-bold text-sm w-12 flex-shrink-0">' + (item.Heure || '') + '</span>' +
                                '<span class="text-gray-900 text-sm font-semibold truncate">' + lieu + '</span>' +
                            '</div>' +
                            badgeDecouvrir +
                        '</div>' +
                        (desc ? '<div id="' + detailsId + '" class="hidden mt-3 text-xs text-gray-600 bg-slate-50 p-3 rounded border-l-2 border-blue-900 leading-relaxed">' + desc.replace(/\n/g, '<br>') + '</div>' : '');
                    
                    container.appendChild(div);
                    
                    var trigger = document.getElementById('trigger-' + detailsId);
                    if (trigger && desc) {
                        trigger.addEventListener('click', function() {
                            var el = document.getElementById(detailsId);
                            if (el) el.classList.toggle('hidden');
                        });
                    }
                })(i);
            }
        }

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('btn-lang-fr').className = lang === 'FR' ? 'px-4 py-1 bg-blue-900 text-white font-bold rounded-l text-sm' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-l text-sm';
            document.getElementById('btn-lang-de').className = lang === 'DE' ? 'px-4 py-1 bg-blue-900 text-white font-bold rounded-r text-sm' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-r text-sm';
            renderProgramme();
        }

        function renderUrgence() {
            var listEl = document.getElementById('urgence-list');
            if (!listEl) return;
            listEl.innerHTML = '';
            
            for (var i = 0; i < dataUrgence.length; i++) {
                var u = dataUrgence[i];
                var div = document.createElement('div');
                div.className = "bg-white p-4 rounded-lg shadow-sm border border-red-100 my-2 flex justify-between items-center";
                div.innerHTML = '<div>' +
                        '<div class="font-bold text-gray-900 text-sm uppercase">' + (u.Nom || '') + '</div>' +
                        '<div class="text-xs text-red-600 font-mono font-semibold mt-0.5">' + (u.Numéro || 'Pas de numéro') + '</div>' +
                    '</div>' +
                    (u.Numéro ? '<a href="tel:' + u.Numéro + '" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1.5 rounded-full text-xs font-bold shadow-sm flex items-center gap-1">📞 Appeler</a>' : '');
                listEl.appendChild(div);
            }
        }

        function switchTab(tabId) {
            var contents = document.querySelectorAll('.tab-content');
            for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
            
            var buttons = document.querySelectorAll('.tab-button');
            for (var i = 0; i < buttons.length; i++) buttons[i].classList.remove('active');
            
            document.getElementById(tabId).classList.add('active');
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadAllData();
        });
    </script>
</body>
</html>
