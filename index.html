<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triangulaire Lille</title>
<!-- Tailwind CSS pour un design moderne et rapide -->
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<style>
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-button.active { border-bottom: 3px solid #1a365d; color: #1a365d; font-weight:
bold; }
</style>
</html>
<body class="bg-gray-50 font-sans pb-20">
<!-- SCRIPT DE CONFIGURATION -->
<script>
        var SPREADSHEET_ID = '126LXvjJdgHsJ1P_4OE2oL2aj3qm-YYfgUnesx8zrXIg';
        
        var dataParticipants = [];
        var dataProgramme = [];
        var dataUrgence = [];
        var currentLanguage = 'FR';
        var currentSort = 'alpha';

        async function fetchSheetTab(tabName) {
            var url = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/gviz/tq?tqx=out:json&sheet=' + encodeURIComponent(tabName);
            var response = await fetch(url);
            var text = await response.text();
            
            var match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\);/);
            if (!match) {
                throw new Error("Format Google invalide");
            }
            
            var json = JSON.parse(match[1]);
            var rows = json.table.rows;
            
            // Récupération des colonnes à l'ancienne
            var cols = [];
            for (var i = 0; i < json.table.cols.length; i++) {
                cols.push(json.table.cols[i].label || '');
            }
            
            // Traitement des lignes sans fonctions fléchées
            var result = [];
            for (var r = 0; r < rows.length; r++) {
                var row = rows[r];
                var item = {};
                if (row && row.c) {
                    for (var c = 0; c < row.c.length; c++) {
                        if (cols[c]) {
                            var cell = row.c[c];
                            if (cell && cell.v !== null && cell.v !== undefined) {
                                item[cols[c]] = cell.v;
                            } else {
                                item[cols[c]] = '';
                            }
                        }
                    }
                    result.push(item);
                }
            }
            return result;
        }

        async function initApp() {
            try {
                dataParticipants = await fetchSheetTab('Participants');
                dataProgramme = await fetchSheetTab('Programme');
                dataUrgence = await fetchSheetTab('Urgence');
                
                renderParticipants();
                renderProgramme();
                renderUrgence();
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = "Erreur. Vérifiez que le Sheet est bien partagé publiquement.";
            }
        }

        function renderParticipants() {
            var listEl = document.getElementById('participants-list');
            listEl.innerHTML = '';
            
            var sorted = dataParticipants.slice();
            if (currentSort === 'alpha') {
                sorted.sort(function(a, b) {
                    return (a.Nom || '').localeCompare(b.Nom || '');
                });
                for (var i = 0; i < sorted.length; i++) {
                    listEl.appendChild(createParticipantCard(sorted[i]));
                }
            } else {
                var clubs = {};
                for (var i = 0; i < sorted.length; i++) {
                    var p = sorted[i];
                    var c = p.Club || 'Sans Club';
                    if (!clubs[c]) clubs[c] = [];
                    clubs[c].push(p);
                }
                for (var club in clubs) {
                    var header = document.createElement('h3');
                    header.className = "text-md font-bold text-blue-900 bg-blue-50 p-2 mt-4 rounded";
                    header.innerText = club;
                    listEl.appendChild(header);
                    
                    clubs[club].sort(function(a, b) {
                        return (a.Nom || '').localeCompare(b.Nom || '');
                    });
                    
                    for (var j = 0; j < clubs[club].length; j++) {
                        listEl.appendChild(createParticipantCard(clubs[club][j]));
                    }
                }
            }
        }

        function createParticipantCard(p) {
            var div = document.createElement('div');
            div.className = "bg-white p-3 rounded-lg shadow-sm border border-gray-100 my-2 flex items-center gap-3";
            var photoUrl = p.Photo || 'https://via.placeholder.com/150?text=No+Photo';
            var conjointText = p.Conjoint ? ' • Conjoint(e) : ' + p.Conjoint : '';
            
            div.innerHTML = '<img src="' + photoUrl + '" class="w-12 h-12 rounded-full object-cover bg-gray-200" onerror="this.src=\'https://via.placeholder.com/150?text=Photo\'">' +
                '<div class="flex-1">' +
                    '<div class="font-bold text-gray-800">' + (p.Nom || '') + ' ' + (p.Prénom || '') + '</div>' +
                    '<div class="text-xs text-gray-500">' + (p.Profession || '') + conjointText + '</div>' +
                    '<div class="text-xs text-blue-700 italic">' + (p.Club || '') + '</div>' +
                '</div>';
            return div;
        }

        function changeSort(type) {
            currentSort = type;
            document.getElementById('btn-sort-alpha').className = type === 'alpha' ? 'px-3 py-1 bg-blue-900 text-white rounded text-xs' : 'px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs';
            document.getElementById('btn-sort-club').className = type === 'club' ? 'px-3 py-1 bg-blue-900 text-white rounded text-xs' : 'px-3 py-1 bg-gray-200 text-gray-700 rounded text-xs';
            renderParticipants();
        }

        function renderProgramme() {
            var container = document.getElementById('programme-container');
            container.innerHTML = '';
            
            for (var i = 0; i < dataProgramme.length; i++) {
                (function(index) {
                    var item = dataProgramme[index];
                    var lieu = currentLanguage === 'FR' ? (item.Lieu_FR || '') : (item.Lieu_DE || '');
                    var desc = currentLanguage === 'FR' ? (item.Description_FR || '') : (item.Description_DE || '');
                    
                    var detailsId = 'details-' + index;
                    var div = document.createElement('div');
                    div.className = "bg-white border-b border-gray-200 p-4";
                    
                    div.innerHTML = '<div class="flex justify-between items-center cursor-pointer font-medium" id="trigger-' + detailsId + '">' +
                            '<div class="flex gap-3">' +
                                '<span class="text-blue-900 font-bold w-16">' + (item.Heure || '') + '</span>' +
                                '<span class="text-gray-800">' + lieu + '</span>' +
                            '</div>' +
                            '<span class="text-gray-400 text-xs">▼ Dérouler</span>' +
                        '</div>' +
                        '<div id="' + detailsId + '" class="hidden mt-3 text-sm text-gray-600 bg-gray-50 p-3 rounded border-l-2 border-blue-500">' +
                            desc.replace(/\\n/g, '<br>') +
                        '</div>';
                    
                    container.appendChild(div);
                    
                    document.getElementById('trigger-' + detailsId).addEventListener('click', function() {
                        var el = document.getElementById(detailsId);
                        if (el.classList.contains('hidden')) {
                            el.classList.remove('hidden');
                        } else {
                            el.classList.add('hidden');
                        }
                    });
                })(i);
            }
        }

        function switchLanguage(lang) {
            currentLanguage = lang;
            document.getElementById('btn-lang-fr').className = lang === 'FR' ? 'px-4 py-1 bg-blue-900 text-white font-bold rounded-l text-sm' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-l text-sm';
            document.getElementById('btn-lang-de').className = lang === 'DE' ? 'px-4 py-1 bg-blue-900 text-white font-bold rounded-r text-sm' : 'px-4 py-1 bg-gray-200 text-gray-700 rounded-r text-sm';
            renderProgramme();
        }

        function renderUrgence() {
            var listEl = document.getElementById('urgence-list');
            listEl.innerHTML = '';
            for (var i = 0; i < dataUrgence.length; i++) {
                var u = dataUrgence[i];
                var div = document.createElement('div');
                div.className = "bg-white p-4 rounded-lg shadow-sm border border-red-100 my-2 flex justify-between items-center";
                div.innerHTML = '<div>' +
                        '<div class="font-bold text-gray-800">' + (u.Nom || '') + '</div>' +
                        '<div class="text-sm text-red-600 font-mono font-semibold">' + (u.Numéro || '') + '</div>' +
                    '</div>' +
                    '<a href="tel:' + (u.Numéro || '') + '" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-full text-sm font-bold">' +
                        '📞 Appeler' +
                    '</a>';
                listEl.appendChild(div);
            }
        }

        function switchTab(tabId) {
            var contents = document.querySelectorAll('.tab-content');
            for (var i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }
            var buttons = document.querySelectorAll('.tab-button');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.onload = initApp;
    </script>
